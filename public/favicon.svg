<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded brand blue background matching the website's branding (#00A3FF) -->
  <rect width="32" height="32" rx="8" fill="#00A3FF"/>
  
  <!-- Clean, bold, and highly-legible "SK" letters centered -->
  <text x="50%" y="55%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#FFFFFF" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="900" 
        font-size="14" 
        letter-spacing="-0.5px">SK</text>
</svg>
